<script>
    // 亮暗模式切換（燈泡圖示）
    const modeToggle = document.getElementById('modeToggle');
    function updateBulbIcon() {
      const bulbDark = document.getElementById('bulbDark');
      const bulbLight = document.getElementById('bulbLight');
      if (document.body.classList.contains('light')) {
        bulbDark.style.display = 'none';
        bulbLight.style.display = 'block';
      } else {
        bulbDark.style.display = 'block';
        bulbLight.style.display = 'none';
      }
    }
    function applySavedTheme() {
      const saved = localStorage.getItem('themeMode');
      if (saved === 'light') {
        document.body.classList.add('light');
      } else {
        document.body.classList.remove('light');
      }
      updateBulbIcon();
    }
    if (modeToggle) {
      modeToggle.addEventListener('click', function() {
        const isLight = document.body.classList.toggle('light');
        localStorage.setItem('themeMode', isLight ? 'light' : 'dark');
        updateBulbIcon();
      });
      applySavedTheme();
    }
    window.addEventListener('storage', function(e) {
      if (e.key === 'themeMode') {
        applySavedTheme();
      }
    });
  // ...existing code...

  // 繁簡切換
  const langSelect = document.querySelector('.lang-select');
  const titleEl = document.querySelector('.title');
  const btns = document.querySelectorAll('.category-btn');
  // 原始內容備份
  const originalTitle = titleEl.textContent;
  const originalBtns = Array.from(btns).map(btn => btn.textContent);
  // 簡體對應
  const zhTw = [
    '詩文背誦','國文','英文','公職考試','名言佳句','綜合','比賽','撩語錄','八卦','猜謎','笑話','數學','物理','化學','生物','地理','天文','歷史','公民','心理','哲學','自然','社會'
  ];
  const zhCn = [
    '诗文背诵','语文','英语','公职考试','名言佳句','综合','比赛','撩语录','八卦','猜谜','笑话','数学','物理','化学','生物','地理','天文','历史','公民','心理','哲学','自然','社会'
  ];
  langSelect.addEventListener('change', function() {
    if (langSelect.value === '简体中文') {
      if (titleEl) titleEl.textContent = '智人题库';
      btns.forEach((btn, i) => { btn.textContent = zhCn[i] || btn.textContent; });
    } else {
      if (titleEl) titleEl.textContent = originalTitle;
      btns.forEach((btn, i) => { btn.textContent = originalBtns[i]; });
    }
  });
</script>
  <img src="speaker.png" alt="speaker" class="speaker-img-fixed" id="speaker-img">
  <div id="speaker-tooltip" style="display:none;position:fixed;top:0;left:0;background:rgba(0,0,0,0.85);color:#fff;padding:10px 18px;border-radius:12px;font-size:1.1rem;z-index:101;box-shadow:0 2px 8px rgba(0,0,0,0.15);pointer-events:none;">推荐搭配一點音樂</div>
  <script>
    const speakerImg = document.getElementById('speaker-img');
    const logoImg = document.getElementById('logo-img');
    const tooltip = document.getElementById('speaker-tooltip');
    speakerImg.addEventListener('mouseenter', function(e) {
      tooltip.style.display = 'block';
    });
    speakerImg.addEventListener('mouseleave', function(e) {
      tooltip.style.display = 'none';
    });
    speakerImg.addEventListener('mousemove', function(e) {
      const offsetX = 18;
      const offsetY = 18;
      tooltip.style.left = (e.clientX + offsetX) + 'px';
      tooltip.style.top = (e.clientY + offsetY) + 'px';
    });

    function setImageColorByMode() {
      const isLight = document.body.classList.contains('light');
      if (isLight) {
        speakerImg.style.filter = 'invert(0) brightness(0)';
        logoImg.style.filter = 'invert(0) brightness(0)';
        document.getElementById('bulbCircle').setAttribute('fill', '#FFD600');
      } else {
        speakerImg.style.filter = '';
        logoImg.style.filter = '';
        document.getElementById('bulbCircle').setAttribute('fill', '#FFF');
      }
    }
    setImageColorByMode();
    // Listen for mode changes
    const observer = new MutationObserver(setImageColorByMode);
    observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });

    // 點擊燈泡切換亮暗模式
    document.getElementById('bulb-center').addEventListener('click', function() {
      const isLight = document.body.classList.toggle('light');
      localStorage.setItem('themeMode', isLight ? 'light' : 'dark');
      setImageColorByMode();
    });
  </script>
